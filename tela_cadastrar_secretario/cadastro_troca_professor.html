<!DOCTYPE html>
<html lang="pt -br">
<head>
    <link rel="stylesheet" href="CSS_cadastros/cadastro.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Cadastrar novo Professor</title>
</head>
<body>
    <h1>Cadastro de trocas dos professores </h1>
    <br>
    <br>
    <h2>Complete as informações:</h2>
    <fieldset>
        <p>
            <label for="datatroca">Data da troca:</label>
            <input type="date" name="datatroca" id="datatroca">
        </p>
        <p>
            <label for="antigo">Professor Antigo:</label>
            <input type="text" name="antigo" id="antigo">
        </p>
        <p>
            <label for="novo">Professor Novo:</label>
            <input type="text" name="novo" id="novo">
        </p>
        
    </fieldset>
    <button type="button" oneclik="mansagem();">Enviar Dados</button>
    
</body>
</html>
