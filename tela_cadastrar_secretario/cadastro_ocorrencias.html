<!DOCTYPE html>
<head>
    <link rel="stylesheet" href="CSS_cadastros/cadastro.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Cadastro de Ocorrências</h1>
    <br>
    <br>
    <h2>Complete as informações:</h2>

    <div class="container3">
    <fieldset>
        <p>
            <label><strong>Número do aluno:</strong></label>
            <input type="number" name="Num_Aluno" id="num_aluno" required> <br>
        </p>
        <p>
            <label> <strong>Número do professor:</strong></label>
            <input type="number" name="Num_Prof" id="Num_Prof" required> <br>
        </p>
        <p>
            <strong>Descrição:</strong>
            <input type="text" name="Desc_Ocorrencia" id="Desc_Ocorrencia" required size="60"> <br>
        </p>
        <p>
            <strong>Data:</strong>
            <input type="date" name="Data_Ocorrido" id="Data_Ocorrido" required>
        </p>
    </fieldset>

    <br>

    <button type="button" oneclik="mansagem();">Enviar Dados</button>
    <br>
</div>
</body>
</html>
