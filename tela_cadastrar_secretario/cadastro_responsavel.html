<!DOCTYPE html>
<html lang="pt -br">
<head>
    <link rel="stylesheet" href="CSS_cadastros/cadastro.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Responsáveis</title>
</head>
<body>

    <div class="sidebar">
        <div class="user-info">
            <img src="user.jpg" alt="Usuário" class="user-avatar">
            <p class="user-name">Usuario</p>
        </div>
        <ul class="menu">
            <li><a href="#">Início</a></li>
            <li><a href="/ProInt/tela_responsavel_perfil.html">Perfil</a></li>
        
            <li><a href="/ProInt/tela_responsavel_justificativa.html">Justificar Falta</a></li>
            <li><a href="/tela_login/telaaluno.html">Sair</a></li>
        </ul>

    </div>
    <fieldset><h2>Complete as informações:</h2></fieldset>
    <br>  

    <div class="container3">
      <p>
              <label for="nome"> Digite seu nome completo:</label>
              <input type="text"name="nome" id="nome">
          </p>
          <p>
              <label for="email">Digite seu email:</label>
              <input type="email" name="email" id="email">
          </p>
          <p>
              <label for="telefone">Digite seu número de telefone:</label>
              <input type="tel" name="telefone" id="telefone">
          </p>
          <p>
              <label for="rg">Digite seu CPF/RG:</label>
              <input type="text" name="rg" id="rg">
          </p>

                  <p>
                        <label for="genero"> Qual seu gênero</label>
                    </p>
                    <p>
                        <input type="radio" name="sexo" id="feminino" value="feminino">
                        <label for="feminino">Feminino</label>
                    </p>
                    <p>
                        <input type="radio" name="sexo" id="masculino" value="masculino">
                        <label for="masculino">Masculino</label>
                    </p>
                    <p>
                        <input type="radio" name="sexo" id="outro" value="outro">
                        <label for="outro">Outro</label>
                    </p>
                    <br>
            <p>
                <label for="parentesco">Qual o se grau de parentesco com o aluno?</label>
    
                    <option value="0" selected disabled>Escolha uma opção</option>
                        <option value="mãe">Mãe</option>
                        <option value="pai">Pai</option>
                        <option value="avô/avó">Avô/Avó</option>
                        <option value="tio/tia">Tio/Tia</option>
               
            </p>


        <p>
            <label for="endereco">Digite seu endereço completo:</label>
            <input type="text" name="endereco" id="endereco">
        </p>

        <p>
            <label for="observacoes">Observações adicionais:</label>
            <input type="text" name="observacoes" id="observacoes">
        </p>

        <button type="button" oneclik="mansagem();">Cadastrar</button>

        </div>
</body>
</html>
