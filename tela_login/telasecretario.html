<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Secretário - Mundo Mágico</title>
    <link rel="stylesheet" href="CSS_login/style_login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-user-tie" style="font-size: 3em; color: white;"></i>
        </div>
        <h1>Área do Secretário</h1>
        <h2>Mundo Mágico - Painel Administrativo</h2>
        
        <div class="input-group">
            <label for="username"><i class="fas fa-id-card"></i> Matrícula</label>
            <input type="text" id="username" placeholder="Digite sua matrícula">
        </div>
        
        <div class="input-group">
            <label for="password"><i class="fas fa-lock"></i> Senha</label>
            <input type="password" id="password" placeholder="Digite sua senha">
        </div>
        
        <button>
            <a href="../visao_secretario/Telas_Secretario/index.html"><i class="fas fa-sign-in-alt"></i> Acessar Sistema</a>
        </button>
        
        <div class="links">
            <a href="telaaluno.html"><i class="fas fa-arrow-left"></i> Voltar ao Login Principal</a> 
            <a href="esqueci-senha.html"><i class="fas fa-question-circle"></i> Esqueci minha senha</a>
        </div>
    </div>

</body>
</html>
