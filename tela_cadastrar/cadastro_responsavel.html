<!DOCTYPE html>
<html lang="pt -br">
<head>
    <link rel="stylesheet" href="cadastro.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Responsáveis</title>
    <style>
         h1{
        font-size: 200PX;
    }
    </style>
</head>
<body>

    <h1>Cadastrar Responsável</h1>
    <fieldset>
        <p>
                <label for="nome"> Digite seu nome completo:</label>
                <input type="text"name="nome" id="nome">
            </p>
            <p>
                <label for="email">Digite seu email:</label>
                <input type="email" name="email" id="email">
            </p>
            <p>
                <label for="telefone">Digite seu número de telefone:</label>
                <input type="tel" name="telefone" id="telefone">
            </p>
            <p>
                <label for="rg">Digite seu CPF/RG:</label>
                <input type="text" name="rg" id="rg">
            </p>
            <p>
                <label for="sexo">Digite seu sexo:</label>
                <input type="text" name="sexo" id="sexo">
            </p>
            <p>
                <label for="parentesco">Digite seu grau de parentesco com o/a aluno/a:</label>
                <input type="text" name="parentesco" id="parentesco">
            </p>
            <p>
                <label for="endereco">Digite seu endereço completo:</label>
                <input type="text" name="endereco" id="endereco">
            </p>
            <p>
                <label for="observacoes">Observações adicionais:</label>
                <input type="text" name="observacoes" id="observacoes">
            </p>
            <label for=></label>
            <br>
            <button type="submit"> <strong>Cadastrar</strong></button>
    </fieldset>

</body>
</html>
