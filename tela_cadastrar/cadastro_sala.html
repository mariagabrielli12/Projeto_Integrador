<!DOCTYPE html>
<html lang="pt -br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salas</title>
</head>
<body>
    <p>
        <label for="sala">Nome da sala:</label>
        <input type="text" name="sala" id="nala">
    </p>

    <p>
        <label for="capacidade">Capacidade da sala:</label>
        <input type="number" name="capacidade" id="capacidade": min="0" max="90">
    </p>

    <p>
        <label for="tipo">Tipo de sala:</label>
        <input type="text" name="tipo" id="tipo">
    </p>
    
</body>
</html>
