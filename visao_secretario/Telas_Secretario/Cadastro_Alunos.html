            <!-- Formulário de Cadastro -->
            <form class="form-container" action="cadastro_alunos.php" method="POST">

                <h3 class="section-title">Dados do Aluno</h3>
                
                <div class="form-row">
                    <div class="form-group photo-upload">
                        <label>Foto do Aluno</label>
                        <div class="photo-preview">
                            <i class="fas fa-user"></i>
                        </div>
                        <button class="btn btn-secondary">
                            <i class="fas fa-upload"></i> Escolher arquivo
                        </button>
                        <span class="file-info">Nenhum arquivo escolhido</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" placeholder="Nome completo" required>

                    </div>
                    
                    <div class="form-group">
                        <label for="student-rg">RG</label>
                        <input type="text" id="student-rg" name="student-rg" placeholder="Número do RG"required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="student-cpf">CPF</label>
                        <input type="text" id="student-cpf" name="student-cpf" placeholder="000.000.000-00" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="student-birth">Data de Nascimento</label>
                        <input type="text" id="student-birth" name="student-birth" placeholder="dd/mm/aaaa" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="student-phone">Telefone (Responsável)</label>
                        <input type="tel" id="student-phone" name="student-phone" placeholder="(00) 00000-0000" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="student-email">E-mail (Responsável)</label>
                    <input type="email" id="student-email" name="student-email" placeholder="exemplo@email.com" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="current-class">Turma </label>
                        <select id="current-class" required>
                            <option value="">Selecione a turma atual</option>
                            <option value="turma1">Turma 1</option>
                            <option value="turma2">Turma 2</option>
                            <option value="turma3">Turma 3</option>
                        </select>
                    </div>
                </div>
                <h3 class="section-title">Endereço</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="student-cep">CEP</label>
                        <input type="text" id="student-cep" name="student-cep" placeholder="00000-000" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="student-address">Logradouro</label>
                        <input type="text" id="student-address" name="student-address" placeholder="Rua, Avenida, etc." required>
                    </div>
                    
                    <div class="form-group">
                        <label for="student-number">Número</label>
                        <input type="text" id="student-number" name="student-number" placeholder="Número" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="student-state">Estado</label>
                        <select id="student-state">
                            <option value="">Selecione</option>
                            <option value="SP">São Paulo</option>
                            <option value="RJ">Rio de Janeiro</option>
                            <option value="MG">Minas Gerais</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="student-city">Cidade</label>
                        <input type="text" id="student-city" name="student-city" placeholder="Cidade" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="student-district">Bairro</label>
                        <input type="text" id="student-district" name="student-district" placeholder="Bairro" required>
                    </div>
                    
                    <div class="form-group">

                    </button>
                   <button class="btn btn-primary" id="SalvarCadastro">

                    </button>

<script>
document.addEventListener("DOMContentLoaded", function () {
    // Máscaras
    const cpfInput = document.getElementById('student-cpf');
    const phoneInput = document.getElementById('student-phone');
    const birthInput = document.getElementById('student-birth');
    const cepInput = document.getElementById('student-cep');

    // Máscara CPF
    cpfInput.addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '').slice(0, 11);
        if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
        else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
        else if (v.length > 3) v = v.replace(/(\d{3})(\d+)/, '$1.$2');
        e.target.value = v;
    });

    // Máscara telefone
    phoneInput.addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '').slice(0, 11);
        if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
        else if (v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d+)/, '($1) $2-$3');
        else if (v.length > 2) v = v.replace(/(\d{2})(\d+)/, '($1) $2');
        e.target.value = v;
    });

    // Máscara data
    birthInput.addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '').slice(0, 8);
        if (v.length > 4) v = v.replace(/(\d{2})(\d{2})(\d{4})/, '$1/$2/$3');
        else if (v.length > 2) v = v.replace(/(\d{2})(\d+)/, '$1/$2');
        e.target.value = v;
    });

    // Máscara CEP
    cepInput.addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '').slice(0, 8);
        if (v.length > 5) v = v.replace(/(\d{5})(\d+)/, '$1-$2');
        e.target.value = v;
    });

    // Validação ao clicar em salvar
    document.getElementById("SalvarCadastro").addEventListener("click", function (event) {
        event.preventDefault();

        const campos = [
            { id: "nome", nome: "Nome" },
            { id: "student-rg", nome: "RG" },
            { id: "student-cpf", nome: "CPF" },
            { id: "student-birth", nome: "Data de Nascimento" },
            { id: "student-phone", nome: "Telefone" },
            { id: "student-email", nome: "Email" },
            { id: "student-cep", nome: "CEP" },
            { id: "student-address", nome: "Logradouro" },
            { id: "student-number", nome: "Número" },
            { id: "student-city", nome: "Cidade" },
            { id: "student-district", nome: "Bairro" },
         
            { id: "student-state", nome: "Estado" },
        ];

        let valido = true;

        // Limpar mensagens anteriores
        document.querySelectorAll(".mensagem-erro").forEach(e => e.remove());
        document.querySelectorAll("input, select").forEach(el => el.classList.remove("erro"));

        campos.forEach(campo => {
            const input = document.getElementById(campo.id);
            const valor = input.value.trim();

            if (!valor || (input.tagName === "SELECT" && valor === "")) {
                valido = false;
                input.classList.add("erro");

                const msg = document.createElement("div");
                msg.className = "mensagem-erro";
                msg.textContent = `${campo.nome} é obrigatório.`;

                input.parentNode.appendChild(msg);
            }
        });

        if (valido) {
        document.querySelector("form").submit();
    }
    });
});
</script>
