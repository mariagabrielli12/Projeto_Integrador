<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rede Educacional - Cadastrar Turma</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="CSS_Secretario/Style_Secretario.css" />
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <i class="fas fa-graduation-cap"></i>
      <h1>Rede Educacional</h1>
    </div>
    <div class="menu">
  <div class="menu-section">
    <div class="menu-item">
      <i class="fas fa-user-cog"></i>
      <span>Início</span>
    </div>

    <div class="menu-item has-submenu open">
      <i class="fas fa-user-cog"></i>
      <span>Cadastros</span>
    </div>
    <div class="submenu open">
      <!-- Listagens -->
      <div class="menu-item">
        <i class="fas fa-users"></i>
        <span><a href="Listagem_Alunos.html" style="color:inherit; text-decoration:none;">Cadastro de Alunos</a></span>
      </div>
      
      <div class="menu-item">
        <i class="fas fa-file-medical"></i>
        <span><a href="Listagem_Atestado.html" style="color:inherit; text-decoration:none;">Cadastro de Atestados</a></span>
      </div>
      
      <div class="menu-item">
        <i class="fas fa-chalkboard-teacher"></i>
        <span><a href="Listagem_Turma.html" style="color:inherit; text-decoration:none;">Cadastro de Turmas</a></span>
      </div>
      
      <div class="menu-item">
        <i class="fas fa-door-open"></i>
        <span><a href="Listagem_Sala.html" style="color:inherit; text-decoration:none;">Cadastro de Salas</a></span>
      </div>
      

</div>
      <div class="menu-item has-submenu open">
      <i class="fas fa-user-cog"></i>
      <span>Gerenciamento</span>
    </div>
     <div class="submenu open">
      <!-- Operações -->
      <div class="menu-item">
        <i class="fas fa-exchange-alt"></i>
        <span><a href="Troca_Turma.html" style="color:inherit; text-decoration:none;">Troca de Turma</a></span>
      </div>
      <div class="menu-item">
        <i class="fas fa-exchange-alt"></i>
        <span><a href="Listagem_Ocorrencia.html" style="color:inherit; text-decoration:none;">Ocorrências</a></span>
      </div>
      </div>
    </div>
  
</div>
  </div>

  <!-- Conteúdo Principal -->
  <div class="main-content">
    <div class="header">
      <div class="page-title">
        <i class="fas fa-layer-group"></i>
        <h2>Cadastro de Turma</h2>
      </div>
      <div class="user-info">
        <div class="user-avatar">AD</div>
        <span>Admin</span>
      </div>
    </div>

    <div class="content-container">
      <!-- Formulário de Cadastro -->
      <div class="form-container">
        <h3 class="section-title">Dados da Turma</h3>

        <div class="form-row">
          <div class="form-group">
            <label for="class-name">Nome da Turma*</label>
            <input type="text" id="class-name" placeholder="Ex: 1º Ano A" required />
          </div>

          <div class="form-group">
            <label for="academic-year">Ano Letivo*</label>
            <input type="number" id="academic-year" placeholder="Ex: 2025" required />
          </div>

          <div class="form-group">
            <label for="class-shift">Turno*</label>
            <select id="class-shift" required>
              <option value="">Selecione</option>
              <option value="manha">Manhã</option>
              <option value="tarde">Tarde</option>
              <option value="noite">Noite</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="assigned-room">Sala Designada*</label>
            <input type="text" id="assigned-room" placeholder="Ex: Sala 101" required />
          </div>

          <div class="form-group">
            <label for="class-teacher">Professor Responsável*</label>
            <input type="text" id="class-teacher" placeholder="Nome do professor" required />
          </div>

          <div class="form-group">
            <label for="max-students">Número Máximo de Alunos*</label>
            <input type="number" id="max-students" placeholder="Ex: 30" min="1" required />
          </div>
        </div>

        <div class="form-group">
          <label for="class-description">Descrição</label>
          <input type="text" id="class-description" placeholder="Descrição adicional da turma (opcional)" />
        </div>

        <div class="form-actions">
          <button class="btn btn-secondary">
            <i class="fas fa-times"></i> Cancelar
          </button>
          <button class="btn btn-primary">
            <i class="fas fa-save"></i> Salvar Turma
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="footer-path">M:\visim</div>
        <div>Copyright © 2025 Rede Educacional. Todos os direitos reservados.</div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const menuItems = document.querySelectorAll('.menu-item.has-submenu');
      menuItems.forEach(item => {
        item.addEventListener('click', function (e) {
          if (e.target.tagName === 'I' || e.target.tagName === 'SPAN') return;
          const submenu = this.nextElementSibling;
          this.classList.toggle('open');
          submenu.classList.toggle('open');
        });
      });
    });
  </script>
</body>
</html>
