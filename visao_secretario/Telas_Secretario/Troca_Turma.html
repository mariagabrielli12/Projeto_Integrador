    <!-- Conteúdo Principal -->
    <div class="main-content">
        <div class="header">
            <div class="page-title">
                <i class="fas fa-exchange-alt"></i>
                <h2>Troca de Turma</h2>
            </div>
            <div class="user-info">
                <div class="user-avatar">AD</div>
                <span>Admin</span>
            </div>
        </div>

        <div class="content-container">
            <div class="form-container">
                <h3 class="section-title">Dados para Troca de Turma</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label for="student-name">Aluno*</label>
                        <input type="text" id="student-name" placeholder="Nome do aluno" required />
                    </div>
                    <div class="form-group">
                        <label for="student-id">Matrícula*</label>
                        <input type="text" id="student-id" placeholder="Número da matrícula" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="current-class">Turma Atual*</label>
                        <select id="current-class" required>
                            <option value="">Selecione a turma atual</option>
                            <option value="turma1">Turma 1</option>
                            <option value="turma2">Turma 2</option>
                            <option value="turma3">Turma 3</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="new-class">Nova Turma*</label>
                        <select id="new-class" required>
                            <option value="">Selecione a nova turma</option>
                            <option value="turma1">Turma 1</option>
                            <option value="turma2">Turma 2</option>
                            <option value="turma3">Turma 3</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-secondary" type="reset">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button class="btn btn-primary" type="submit">
                        <i class="fas fa-exchange-alt"></i> Confirmar Troca
                    </button>
                </div>
            </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuItems = document.querySelectorAll('.menu-item.has-submenu');
            menuItems.forEach((item) => {
                item.addEventListener('click', function (e) {
                    if (e.target.tagName === 'I' || e.target.tagName === 'SPAN') return;
                    const submenu = this.nextElementSibling;
                    this.classList.toggle('open');
                    submenu.classList.toggle('open');
                });
            });
        });
    </script>
