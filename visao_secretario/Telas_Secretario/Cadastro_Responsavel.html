    <div class="main-content">

            <div class="page-title">
                <i class="fas fa-user-tie"></i>

            </div>

                <div class="user-avatar">AD</div>

        <div class="content-container">
            <!-- Formulário de Cadastro -->
            <div class="form-container">
                <h3 class="section-title">Dados do Responsável</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" placeholder="Nome completo" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="responsavel-rg">RG</label>
                        <input type="text" id="responsavel-rg" placeholder="Número do RG" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="responsavel-cpf">CPF</label>
                        <input type="text" id="responsavel-cpf" placeholder="000.000.000-00" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="responsavel-phone">Telefone</label>
                        <input type="tel" id="responsavel-phone" placeholder="(00) 00000-0000" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="responsavel-email">E-mail</label>
                    <input type="email" id="responsavel-email" placeholder="exemplo@email.com" required>
                </div>

                <h3 class="section-title">Endereço</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="responsavel-cep">CEP</label>
                        <input type="text" id="responsavel-cep" placeholder="00000-000" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="responsavel-address">Logradouro</label>
                        <input type="text" id="responsavel-address" placeholder="Rua, Avenida, etc." required>
                    </div>
                    
                    <div class="form-group">
                        <label for="responsavel-number">Número</label>
                        <input type="text" id="responsavel-number" placeholder="Número" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="responsavel-state">Estado</label>
                        <select id="responsavel-state">
                            <option value="">Selecione</option>
                            <option value="SP">São Paulo</option>
                            <option value="RJ">Rio de Janeiro</option>
                            <option value="MG">Minas Gerais</option>
                            <!-- Outros estados... -->
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="responsavel-city">Cidade</label>
                        <input type="text" id="responsavel-city" placeholder="Cidade" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="responsavel-district">Bairro</label>
                        <input type="text" id="responsavel-district" placeholder="Bairro" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="responsavel-complement">Complemento</label>
                        <input type="text" id="responsavel-complement" placeholder="Complemento">
                    </div>
                </div>
                
                <div class="form-actions">
                    <button class="btn btn-secondary" id="cancelar">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button class="btn btn-primary" id="SalvarCadastro">
                        <i class="fas fa-save"></i> Salvar Cadastro
                    </button>
                </div>
            </div>

    <script>
        // Mesmo script do Cadastro_Alunos.html com adaptações para os campos de responsável
        document.addEventListener("DOMContentLoaded", function () {
            // Máscaras
            const cpfInput = document.getElementById('responsavel-cpf');
            const phoneInput = document.getElementById('responsavel-phone');
            const cepInput = document.getElementById('responsavel-cep');

            // Máscara CPF
            cpfInput.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 11);
                if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
                else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
                else if (v.length > 3) v = v.replace(/(\d{3})(\d+)/, '$1.$2');
                e.target.value = v;
            });

            // Máscara telefone
            phoneInput.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 11);
                if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                else if (v.length > 6) v = v.replace(/(\d{2})(\d{4})(\d+)/, '($1) $2-$3');
                else if (v.length > 2) v = v.replace(/(\d{2})(\d+)/, '($1) $2');
                e.target.value = v;
            });

            // Máscara CEP
            cepInput.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 8);
                if (v.length > 5) v = v.replace(/(\d{5})(\d+)/, '$1-$2');
                e.target.value = v;
            });

            // Validação ao clicar em salvar
            document.getElementById("SalvarCadastro").addEventListener("click", function (event) {
                event.preventDefault();

                const campos = [
                    { id: "nome", nome: "Nome" },
                    { id: "responsavel-rg", nome: "RG" },
                    { id: "responsavel-cpf", nome: "CPF" },
                    { id: "responsavel-phone", nome: "Telefone" },
                    { id: "responsavel-email", nome: "Email" },
                    { id: "responsavel-cep", nome: "CEP" },
                    { id: "responsavel-address", nome: "Logradouro" },
                    { id: "responsavel-number", nome: "Número" },
                    { id: "responsavel-city", nome: "Cidade" },
                    { id: "responsavel-district", nome: "Bairro" },
                    { id: "responsavel-state", nome: "Estado" },
                ];

                let valido = true;

                // Limpar mensagens anteriores
                document.querySelectorAll(".mensagem-erro").forEach(e => e.remove());
                document.querySelectorAll("input, select").forEach(el => el.classList.remove("erro"));

                campos.forEach(campo => {
                    const input = document.getElementById(campo.id);
                    const valor = input.value.trim();

                    if (!valor || (input.tagName === "SELECT" && valor === "")) {
                        valido = false;
                        input.classList.add("erro");

                        const msg = document.createElement("div");
                        msg.className = "mensagem-erro";
                        msg.textContent = `${campo.nome} é obrigatório.`;

                        input.parentNode.appendChild(msg);
                    }
                });

                if (valido) {
                    // Enviar dados ou redirecionar
                    window.location.href = "Listagem_Responsavel.html";
                }
            });
        });
    </script>
