<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Atestados</title>
  <link rel="stylesheet" href="../tela_cadastrar_secretario/CSS_cadastros/cadas.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2><i data-lucide="school"></i> Secretaria</h2>
      <nav>
        <ul>
          <li><i data-lucide="home"></i> <a href="../Inicio_secretario/tela_inicial_sercretario.html">Início</a></li>
          <li><i data-lucide="user"></i> <a href="cadastro_aluno_responsaveis.html">Cadastro Gerais</a></li>
          <li><i data-lucide="building-2"></i> <a href="cadastro_salas.html">Cadastro de Salas</a></li>
          <li class="active"><i data-lucide="file-text"></i> <a href="#">Cadastro de Atestados</a></li>
          <li><i data-lucide="file-text"></i> <a href="cadastro_turmas.html">Cadastro de Turmas</a></li>
          <li><i data-lucide="refresh-cw"></i> <a href="troca_de_turma.html">Troca de Turma</a></li>
          <li><i data-lucide="book-text"></i> <a href="cadastro_ocorrencias.html">Ocorrências</a></li>
        </ul>
      </nav>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="main-content">
      <h1>Cadastro de Atestados</h1>

      <div class="form-container">
        <div class="form-column">
          <form id="formAtestado">
            <div class="form-group">
              <label for="nomeAluno">Nome do Aluno:</label>
              <input type="text" id="nomeAluno" name="nomeAluno" required>
            </div>

            <div class="form-group">
              <label for="dataInicio">Data de Início:</label>
              <input type="date" id="dataInicio" name="dataInicio" required>
            </div>

            <div class="form-group">
              <label for="dataFim">Data de Fim:</label>
              <input type="date" id="dataFim" name="dataFim" required>
            </div>

            <div class="form-group">
              <label for="motivo">Motivo:</label>
              <textarea id="motivo" name="motivo" rows="3" required></textarea>
            </div>

            <div class="form-group">
              <button type="submit" class="btn-cadastrar">Cadastrar</button>
              <button type="button" onclick="limparCampos()">Limpar</button>
            </div>

            <div id="mensagemSucesso" style="display: none; color: green; margin-top: 10px;">
              Atestado cadastrado com sucesso!
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    const formAtestado = document.getElementById('formAtestado');
    formAtestado.addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('mensagemSucesso').style.display = 'block';

      setTimeout(() => {
        window.location.href = '/visao_secretario/tela_listagem_secretario/listagem_atestados.html';
      }, 2000);
    });

    function limparCampos() {
      document.getElementById('formAtestado').reset();
    }

    lucide.createIcons();
  </script>

  <script src="cadastros.js"></script>
</body>
</html>
