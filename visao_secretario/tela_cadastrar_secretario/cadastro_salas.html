<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Cadastro de Alunos e Responsáveis</title>
  <link rel="stylesheet" href="../tela_cadastrar_secretario/CSS_cadastros/cadas.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
 <body>
  <div class="container">

      <!-- SIDEBAR -->
        <aside class="sidebar">
            <h2><i data-lucide="school"></i> Secretaria</h2>
            <nav>
            <ul>
                <li><i data-lucide="home"></i> <a href="../Inicio_secretario/tela_inicial_sercretario.html">Início</a></li>
                <li><i data-lucide="user"></i> <a href="cadastro_aluno_responsaveis.html">Cadastro Gerais</a></li>
                <li class="active"><i data-lucide="building-2"></i> <a href="cadastro_salas.html">Cadastro de Salas</a></li>
                <li><i data-lucide="file-text"></i> <a href="cadastro_atestados.html">Cadastro de Atestados</a></li>
                <li><i data-lucide="file-text"></i> <a href="cadastro_turmas.html">Cadastro de Turmas</a></li>
                <li><i data-lucide="refresh-cw"></i> <a href="troca_de_turma.html">Troca de Turma</a></li>
                <li ><i data-lucide="book-text"></i> <a href="#">Ocorrências</a></li>
            </ul>
            </nav>
        </aside>

     <!-- Conteúdo principal -->
    <div class="main-content">
      <h1>Cadastro de Salas</h1>

      <div class="form-container">
        <div class="form-column">
          <form id="formSala">
            <div class="form-group">
              <label for="nomeSala">Nome da Sala:</label>
              <input type="text" id="nomeSala" name="nomeSala" required>
            </div>

            <div class="form-group">
              <label for="capacidadeSala">Capacidade:</label>
              <input type="number" id="capacidadeSala" name="capacidadeSala" required>
            </div>

            <div class="form-group">
              <label for="turnoSala">Turno:</label>
              <select id="turnoSala" name="turnoSala" required>
                <option value="">Selecione</option>
                <option value="Manhã">Manhã</option>
                <option value="Tarde">Tarde</option>
                <option value="Integral">Integral</option>
              </select>
            </div>

            <div class="form-group">
              <button type="submit" class="btn-cadastrar">Cadastrar</button>
             <button type="button" onclick="limparCampos()">Limpar</button>
            </div>

            <div id="mensagemSucesso" style="display: none; color: green; margin-top: 10px;">
              Sala cadastrada com sucesso!
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const formSala = document.getElementById('formSala');
    formSala.addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('mensagemSucesso').style.display = 'block';

      // Redireciona após 2 segundos
      setTimeout(() => {
        window.location.href = '/visao_secretario/tela_listagem_secretario/listagem_salas.html';
      }, 2000);
    });
  </script>

  <script>
  function limparCampos() {
    document.getElementById("formSala").reset(); // Limpa os campos
  }
</script>

  <script src="cadastros.js"></script>
  
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
