    <h1>Cadastro de Atestados</h1>

    <div class="form-container">
      <div class="form-column">
        <form id="formAtestado">
          <div class="form-group">
            <label for="nomeAluno">Nome do Aluno:</label>

            <input type="text" id="nomeAluno" name="nomeAluno" required>

            <input type="text" id="nomeAluno" name="nomeAluno" required />
          </div>

          <div class="form-group">

          </div>

          <div class="form-group">
            <label for="tipoocorrencia">tipo da ocorrência:</label>

            <select name="tipo-ocorrencia" id="">
              <option value="0">Escolha uma opção</option>
              <option value="suspensao">Suspensão</option>
              <option value="advertencia">Advertência</option>
              <option value="expulsao">Expulsão</option>
            </select>

          </div>

          </div>

            <label for="motivoAtestado">Motivo:</label>

            <textarea id="motivoAtestado" placeholder="Descreva o motivo..." rows="4"></textarea>

          </div>

            <button type="button" onclick="limparCampos()">Limpar</button>
