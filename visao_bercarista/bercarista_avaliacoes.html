             <option value="opcao1"></option>
             <option value="Comunicacao e linguagem-bom">Boa</option>
             <option value="Comunicacao e linguagem">Ruim</option>
               </select>
              
               <label for="ambiente">Ambiente:</label>

             <option value="opcao1"></option>
             <option value="ambiente-bom">Bom</option>
             <option value="ambiente-ruim">Ruim</option>
               </select>
            </div>
            <div class="observacao">
                <label for="observacao-do-dia">Observação do Dia:</label>
                <input type="text">
            </div>
                
            <button>Salvar</button>
