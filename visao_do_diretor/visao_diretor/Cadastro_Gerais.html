<!DOCTYPE html> 
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Educacional - Cadastro Geral</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <i class="fas fa-graduation-cap"></i>
      <h1>Rede Educacional</h1>
    </div>
    <div class="menu">
      <div class="menu-section">
        <div class="menu-item">
          <i class="fas fa-user-cog"></i>
          <span>Início</span>
        </div>

        <div class="menu-item has-submenu open">
          <i class="fas fa-user-cog"></i>
          <span>Cadastros</span>
        </div>
        <div class="submenu open">
          <div class="menu-item">
            <i class="fas fa-users"></i>
            <span><a href="listagem_usuarios.html" style="color:inherit; text-decoration:none;">Listagem Geral</a></span>
          </div>
        </div>

        <div class="menu-item has-submenu open">
          <i class="fas fa-cogs"></i>
          <span>Gerenciamento</span>
        </div>
      </div>
    </div>
    <div class="menu-item">
      <div class="logout">
        <i class="fas fa-sign-out-alt"></i>
        <span><a href="/tela_login/teladiretor.html" style="color:inherit; text-decoration:none;">Sair</a></span>
      </div>
    </div>
  </div>

    <div class="main-content">
        <div class="header">
            <div class="page-title">
                <i class="fas fa-user-plus"></i>
                <h2>Cadastro Geral de Usuários</h2>
            </div>
            <div class="user-info">
                <div class="user-avatar">AD</div>
                <span>Admin</span>
            </div>
        </div>

        <div class="content-container">
            <div class="form-container">
                <h3 class="section-title">Dados Básicos</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label for="user-type">Tipo de Usuário</label>
                        <select id="user-type" onchange="showSpecificFields()">
                            <option value="">Selecione o tipo</option>
                            <option value="secretary">Secretário</option>
                            <option value="teacher">Professor</option>
                            <option value="nursery">Berçarista</option>
                            <option value="employee">Funcionário</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="user-name">Nome Completo</label>
                        <input type="text" id="user-name" placeholder="Nome completo">
                    </div>
                    
                    <div class="form-group">
                        <label for="user-cpf">CPF</label>
                        <input type="text" id="user-cpf" placeholder="000.000.000-00">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="user-phone">Telefone</label>
                        <input type="tel" id="user-phone" placeholder="(00) 00000-0000">
                    </div>

                    <div class="form-group">
                        <label for="user-email">E-mail</label>
                        <input type="email" id="user-email" placeholder="exemplo@email.com">
                    </div>
                </div>
                <!-- Seção para Secretário -->
                <div id="secretary-fields" class="specific-fields" style="display:none;">
                    <h3 class="section-title">Dados de Secretário</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="secretary-registry">Nº de Registro</label>
                            <input type="text" id="secretary-registry">
                        </div>
                        <div class="form-group">
                            <label for="secretary-position">Cargo</label>
                            <select id="secretary-position">
                                <option value="">Selecione</option>
                                <option value="secretario">Secretário Escolar</option>
                                <option value="assistente">Assistente Administrativo</option>
                                <option value="coordenador">Coordenador Administrativo</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="secretary-rg">RG</label>
                            <input type="text" id="secretary-rg" placeholder="00.000.000-0">
                        </div>
                        <div class="form-group">
                            <label for="secretary-birthdate">Data de Nascimento</label>
                            <input type="date" id="secretary-birthdate">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="secretary-hiring">Data de Admissão</label>
                            <input type="date" id="secretary-hiring">
                        </div>
                        <div class="form-group">
                            <label for="secretary-status">Status</label>
                            <select id="secretary-status">
                                <option value="active">Ativo</option>
                                <option value="inactive">Inativo</option>
                                <option value="vacation">Férias</option>
                                <option value="leave">Afastado</option>
                            </select>
                        </div>
                    </div>
                </div>
                <!-- Seção para Professor -->
                <div id="teacher-fields" class="specific-fields" style="display:none;">
                    <h3 class="section-title">Dados de Professor</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="teacher-formation">Formação</label>
                            <input type="text" id="teacher-formation">
                        </div>
                        <div class="form-group">
                            <label for="teacher-registry">Nº de Registro</label>
                            <input type="text" id="teacher-registry">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="teacher-address">Endereço</label>
                            <input type="text" id="teacher-address" placeholder="Rua, Av. etc.">
                        </div>
                        <div class="form-group">
                            <label for="teacher-city">Cidade</label>
                            <input type="text" id="teacher-city" placeholder="Cidade">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="teacher-cep">CEP</label>
                            <input type="text" id="teacher-cep" placeholder="00000-000">
                        </div>
                        <div class="form-group">
                            <label for="teacher-state">Estado</label>
                            <select id="teacher-state">
                                <option value="">Selecione</option>
                                <option value="SP">São Paulo</option>
                                <option value="RJ">Rio de Janeiro</option>
                                <!-- Outros estados -->
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="teacher-complement">Complemento</label>
                        <input type="text" id="teacher-complement" placeholder="Complemento">
                    </div>
                </div>
                <!-- Seção para Berçarista -->
                <div id="nursery-fields" class="specific-fields" style="display:none;">
                    <h3 class="section-title">Dados de Berçarista</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nursery-birthdate">Data de Nascimento</label>
                            <input type="date" id="nursery-birthdate">
                        </div>
                        <div class="form-group">
                            <label for="nursery-experience">Experiência com bebês</label>
                            <select id="nursery-experience">
                                <option value="">Selecione</option>
                                <option value="0-1">0-1 ano</option>
                                <option value="1-3">1-3 anos</option>
                                <option value="3-5">3-5 anos</option>
                                <option value="5+">Mais de 5 anos</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nursery-formation">Formação</label>
                            <input type="text" id="nursery-formation" placeholder="Formação acadêmica">
                        </div>
                        <div class="form-group">
                            <label for="nursery-certifications">Certificações</label>
                            <input type="text" id="nursery-certifications" placeholder="Primeiros socorros, etc.">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nursery-availability">Disponibilidade para emergências</label>
                            <select id="nursery-availability">
                                <option value="">Selecione</option>
                                <option value="sim">Sim</option>
                                <option value="nao">Não</option>
                                <option value="parcial">Parcial</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Turnos Disponíveis</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" name="nursery-shift" value="manha"> Manhã</label>
                                <label><input type="checkbox" name="nursery-shift" value="tarde"> Tarde</label>
                                <label><input type="checkbox" name="nursery-shift" value="noite"> Noite</label>
                                <label><input type="checkbox" name="nursery-shift" value="integral"> Integral</label>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Seção para Funcionário -->
                <div id="employee-fields" class="specific-fields" style="display:none;">
                    <h3 class="section-title">Dados de Funcionário</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="employee-department">Departamento</label>
                            <input type="text" id="employee-department">
                        </div>
                        <div class="form-group">
                            <label for="employee-role">Função</label>
                            <input type="text" id="employee-role">
                        </div>
                    </div>
                </div>

                <!-- Endereço (comum a todos) -->
                <h3 class="section-title">Endereço</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="user-cep">CEP</label>
                        <input type="text" id="user-cep" placeholder="00000-000">
                    </div>
                    <div class="form-group">
                        <label for="user-address">Endereço</label>
                        <input type="text" id="user-address" placeholder="Rua, Avenida, etc.">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="user-number">Número</label>
                        <input type="text" id="user-number" placeholder="Número">
                    </div>
                    <div class="form-group">
                        <label for="user-district">Bairro</label>
                        <input type="text" id="user-district" placeholder="Bairro">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="user-state">Estado</label>
                        <select id="user-state">
                            <option value="">Selecione</option>
                            <option value="SP">São Paulo</option>
                            <option value="RJ">Rio de Janeiro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="user-city">Cidade</label>
                        <input type="text" id="user-city" placeholder="Cidade">
                    </div>
                </div>

                <div class="form-group">
                    <label for="user-complement">Complemento</label>
                    <input type="text" id="user-complement" placeholder="Complemento">
                </div>

                <!-- Anexos (comum a todos) -->
                <h3 class="section-title">Anexos</h3>
                <div class="form-row">
                    <div class="form-group photo-upload">
                        <label>Foto 3x4</label>
                        <div class="photo-preview"><i class="fas fa-user"></i></div>
                        <button class="btn btn-secondary"><i class="fas fa-upload"></i> Escolher arquivo</button>
                        <span class="file-info">Nenhum arquivo escolhido</span>
                    </div>

                    <div class="form-group photo-upload">
                        <label>Documento de Identificação</label>
                        <div class="photo-preview"><i class="fas fa-id-card"></i></div>
                        <button class="btn btn-secondary"><i class="fas fa-upload"></i> Escolher arquivo</button>
                        <span class="file-info">Nenhum arquivo escolhido</span>
                    </div>

                    <div class="form-group photo-upload">
                        <label>Comprovante de Residência</label>
                        <div class="photo-preview"><i class="fas fa-home"></i></div>
                        <button class="btn btn-secondary"><i class="fas fa-upload"></i> Escolher arquivo</button>
                        <span class="file-info">Nenhum arquivo escolhido</span>
                    </div>
                </div>

                <!-- Botões -->
                <div class="form-actions">
                    <button class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                        <a href="Listagem_Geral.html"></a>
                    </button>
                   <button class="btn btn-primary" onclick="salvarCadastro()">
                        <i class="fas fa-save"></i> Salvar Cadastro
                    </button>
                </div>
            </div> <!-- Fecha .form-container -->
        </div> <!-- Fecha .content-container -->
    </div> <!-- Fecha .main-content -->

    <script>
  function salvarCadastro() {
    alert("Cadastro concluído com sucesso!");
    window.location.href = "Listagem_Geral.html";
  }

        function showSpecificFields() {
            document.querySelectorAll('.specific-fields').forEach(field => {
                field.style.display = 'none';
            });

            const userType = document.getElementById('user-type').value;
            if (userType) {
                const fieldSection = document.getElementById(`${userType}-fields`);
                if (fieldSection) fieldSection.style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const uploadButtons = document.querySelectorAll('.photo-upload .btn');
            uploadButtons.forEach(button => {
                button.addEventListener('click', function (e) {
                    e.preventDefault();
                    const fileInfo = this.parentElement.querySelector('.file-info');
                    fileInfo.textContent = "arquivo_selecionado.pdf";
                });
            });
        });
    </script>
</body>
</html>
